services:
  punkrecords-saas:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: punkrecords-saas
    restart: unless-stopped
    env_file:
      - .runtime.env
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3000
    networks:
      - traefik_default
      - supabase_net
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik_default
      - traefik.http.routers.punkrecords-saas-http.rule=Host(`punkrecords.canhete.com`)
      - traefik.http.routers.punkrecords-saas-http.entrypoints=web
      - traefik.http.routers.punkrecords-saas-http.middlewares=punkrecords-saas-https-redirect
      - traefik.http.middlewares.punkrecords-saas-https-redirect.redirectscheme.scheme=https
      - traefik.http.routers.punkrecords-saas.rule=Host(`punkrecords.canhete.com`)
      - traefik.http.routers.punkrecords-saas.entrypoints=websecure
      - traefik.http.routers.punkrecords-saas.tls=true
      - traefik.http.routers.punkrecords-saas.tls.certresolver=letsencrypt
      - traefik.http.services.punkrecords-saas.loadbalancer.server.port=3000

networks:
  traefik_default:
    external: true
  supabase_net:
    external: true
    name: agvbg3ptwi7soz8rd08pskaq
